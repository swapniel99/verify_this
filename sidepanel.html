<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Verify This</title>
  <link rel="stylesheet" href="sidepanel.css">
</head>
<body>
  <div id="app">
    <!-- Header -->
    <header id="header">
      <div class="header-left">
        <button id="btn-back" class="icon-btn hidden" title="Back to chat list">←</button>
        <h1 id="header-title">Verify This</h1>
      </div>
      <div class="header-right">
        <button id="btn-theme" class="icon-btn" title="Toggle theme">◑</button>
        <button id="btn-settings" class="icon-btn" title="Settings">⚙</button>
      </div>
    </header>

    <!-- Settings View -->
    <div id="settings-view" class="view hidden">
      <div class="settings-group">
        <label for="api-key-input">Gemini API Key</label>
        <div class="api-key-row">
          <input type="password" id="api-key-input" placeholder="Enter your Gemini API key">
          <button id="btn-save-key" class="btn-primary">Save</button>
        </div>
        <p class="hint">Get a key from <a href="https://aistudio.google.com/apikey" target="_blank">Google AI Studio</a></p>
      </div>
      <div class="settings-group">
        <label>Theme</label>
        <div class="theme-options">
          <button class="theme-btn" data-theme="light">Light</button>
          <button class="theme-btn" data-theme="dark">Dark</button>
          <button class="theme-btn" data-theme="system">System</button>
        </div>
      </div>
      <div class="settings-group">
        <label>
          <input type="checkbox" id="grounding-toggle">
          Enable Web Search Grounding
        </label>
        <p class="hint">Requires paid Gemini API tier. When enabled, responses will cite web sources.</p>
      </div>
    </div>

    <!-- Chat List View -->
    <div id="chat-list-view" class="view">
      <div id="chat-list"></div>
      <div id="empty-state" class="empty-state">
        <p>No fact-checks yet.</p>
        <p class="hint">Highlight text on any page, right-click, and select "Verify This".</p>
      </div>
    </div>

    <!-- Chat View -->
    <div id="chat-view" class="view hidden">
      <div id="messages"></div>
      <div id="input-area">
        <textarea id="user-input" placeholder="Ask a follow-up question..." rows="1"></textarea>
        <button id="btn-send" class="icon-btn" title="Send">▶</button>
      </div>
    </div>
  </div>

  <script src="sidepanel.js"></script>
</body>
</html>
